stages:
  - version
  - security
  - build
  - deploy

version:
  stage: .pre
  image: ubuntu:24.04
  before_script:
    - apt-get update && apt-get install -y git
  script:
    - bash deploy/scripts/version.sh
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^(release|release\/.+|release-.+|main)$/ && $CI_PIPELINE_SOURCE == "push"
      when: on_success

default:
  tags:
    - dedicated
    - docker

variables:
  PNPM_VERSION: "10.33.0"
  STRICT_PNPM_AUDIT: "0"

cache:
  key:
    files:
      - frontend/pnpm-lock.yaml
  paths:
    - frontend/node_modules/

security:python-deps:
  stage: security
  image: python:3.12.3-bookworm
  script:
    - python -m pip install --upgrade pip
    - python -m pip install pip-audit
    - python -m pip_audit -r backend/nunet_api/requirements.txt --strict
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS == null
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

security:frontend-deps:
  stage: security
  image: node:22-bookworm
  script:
    - cd frontend
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - corepack pnpm install --frozen-lockfile
    - corepack pnpm audit --prod --audit-level=critical
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS == null
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

security:frontend-high-report:
  stage: security
  image: node:22-bookworm
  allow_failure: true
  script:
    - cd frontend
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - corepack pnpm install --frozen-lockfile
    - corepack pnpm audit --prod --audit-level=high
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS == null
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

security:strict:python:
  stage: security
  image: python:3.12.3-bookworm
  script:
    - python -m pip install --upgrade pip
    - python -m pip install pip-audit
    - python -m pip_audit -r backend/nunet_api/requirements.txt --strict
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success

security:strict:frontend:
  stage: security
  image: node:22-bookworm
  script:
    - cd frontend
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - corepack pnpm install --frozen-lockfile
    - corepack pnpm audit --prod
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success

security:pnpm-drift-check:
  stage: security
  image: node:22-bookworm
  allow_failure: true
  script:
    - |
      set -euo pipefail
      pinned="${PNPM_VERSION}"
      pinned_major="${pinned%%.*}"
      latest="$(npm view "pnpm@${pinned_major}" version --json | node -e 'const fs=require("fs"); const raw=fs.readFileSync(0,"utf8").trim(); const v=JSON.parse(raw); process.stdout.write(String(Array.isArray(v) ? v[v.length-1] : v));')"
      echo "Pinned pnpm: ${pinned}"
      echo "Latest pnpm in major ${pinned_major}: ${latest}"
      if [ "${pinned}" != "${latest}" ]; then
        echo "PNPM drift detected: update PNPM_VERSION from ${pinned} to ${latest}"
        exit 1
      fi
      echo "PNPM version is current within major ${pinned_major}"
  rules:
    - if: $CI_PIPELINE_SOURCE =~ /^(push|merge_request_event|web|schedule)$/

security:nightly-create-issue-on-failure:
  stage: build
  image: curlimages/curl:8.12.1
  allow_failure: true
  variables:
    ISSUE_TITLE: "Nightly strict security audit failure"
  script:
    - |
      set -euo pipefail
      if [ "${CI_PIPELINE_SOURCE:-}" != "schedule" ]; then
        echo "Not a scheduled pipeline, skipping."
        exit 0
      fi

      # Prefer a dedicated API token; fallback to CI_JOB_TOKEN when available.
      auth_header=""
      if [ -n "${GITLAB_API_TOKEN:-}" ]; then
        auth_header="PRIVATE-TOKEN: ${GITLAB_API_TOKEN}"
      elif [ -n "${CI_JOB_TOKEN:-}" ]; then
        auth_header="JOB-TOKEN: ${CI_JOB_TOKEN}"
      else
        echo "No API token available (GITLAB_API_TOKEN or CI_JOB_TOKEN)."
        exit 0
      fi

      issue_title="${ISSUE_TITLE} (${CI_COMMIT_REF_NAME})"
      issue_body=$(printf "Nightly strict security audit failed.\n\n- Project: %s\n- Branch: %s\n- Pipeline: %s\n- Commit: %s\n\nPlease review failed security jobs and remediate according to policy." \
        "$CI_PROJECT_PATH" \
        "$CI_COMMIT_REF_NAME" \
        "$CI_PIPELINE_URL" \
        "$CI_COMMIT_SHA")

      # Avoid duplicate open issues with the same title.
      encoded_title="$(printf '%s' "${issue_title}" | sed 's/ /%20/g')"
      existing="$(curl -sS --header "${auth_header}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues?state=opened&search=${encoded_title}")"
      if echo "${existing}" | grep -q "\"title\":\"${issue_title}\""; then
        echo "An open issue already exists for: ${issue_title}"
        exit 0
      fi

      response=$(curl -sS --fail -w "%{http_code}" -o response.json \
        --request POST \
        --header "${auth_header}" \
        --data-urlencode "title=${issue_title}" \
        --data-urlencode "description=${issue_body}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues")
      if [ $? -ne 0 ]; then
        echo "Error to create security failure issue."
        cat response.json 2>/dev/null || true
        exit 1
      fi
      if [ "$response" -ne 201 ]; then
        echo "Unexpected HTTP status: $response"
        cat response.json
        exit 1
      fi
      echo "Security failure issue successfully created."
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

.build-deb:
  stage: build
  image: ubuntu:24.04
  before_script:
    - apt-get update && apt-get install -y sudo git
  script:
    - bash deploy/scripts/build.sh
  artifacts:
    untracked: false
    when: on_success
    access: all
    expire_in: "30 days"
    paths:
      - dist/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS == null
    - if: $CI_PIPELINE_SOURCE == "web"


build:x86:
  extends:
    - .build-deb

build:arm64:
  extends:
    - .build-deb
  tags:
    - saas-linux-small-arm64

deploy-packages:
  stage: deploy
  image: bash:alpine3.21
  variables:
    PERMALINK_BUILD_CHANNELS: "main:latest release:stable"
  dependencies:
    - build:x86
    - build:arm64
  needs:
    - build:x86
    - build:arm64
  before_script:
    - apk add curl
  script:
    - echo "Deploying to package registry..."
    - |
      for build_channel_cfg in $PERMALINK_BUILD_CHANNELS; do
        target_branch=$(cut -d ':' -f 1 <<<"$build_channel_cfg")
        build_channel_candidate=$(cut -d ':' -f 2 <<<"$build_channel_cfg")
        if [[ "$target_branch" == "$CI_COMMIT_REF_NAME" ]]; then
          build_channel="$build_channel_candidate"
        fi
      done
      if [[ "$build_channel" == "" ]]; then
        echo no build channel for branch $CI_COMMIT_REF_NAME
        exit 1
      fi
      echo using build channel $build_channel
    - |
      regex='^(release|release\/.+|release-.+|main)$'
      if [[ $CI_COMMIT_REF_NAME =~ $regex ]]; then
        shopt -s globstar nullglob
        cd "${CI_PROJECT_DIR}/dist"
        found=false
        for file in *.deb; do
          [[ -f "$file" ]] || continue
          found=true
          if [[ $file =~ nunet-appliance-(base|web)_([0-9]+\.[0-9]+\.[0-9]+)_([a-zA-Z0-9]+).deb ]]; then
            version=${BASH_REMATCH[2]}
            curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
              --upload-file "$file" \
              "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/nunet-appliance/${version}/${file::-4}-$build_channel.deb"
          fi
        done
        if [[ "$found" = false ]]; then
          echo "No .deb files found in dist/, skipping upload."
        fi
      else
        echo Skipping deployment to package registry...
      fi
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^(release|release\/.+|release-.+|main)$/ && $CI_PIPELINE_SOURCE == "push"
      when: on_success

update-permalinks:
  stage: deploy
  image: bash:alpine3.21
  variables:
    PERMALINK_DEPLOY_SERVER: d.nunet.io
    PERMALINK_DEPLOY_USER: gitlab-runner
    PERMALINK_DEPLOY_FOLDER: /opt/public
    PERMALINK_BUILD_CHANNELS: "main:latest release:stable"
  dependencies:
    - build:x86
    - build:arm64
  needs:
    - build:x86
    - build:arm64
  before_script:
    - apk add rsync openssh
  script:
    - echo $PROD_SSH_KEY_B64 | base64 -d > prod_ssh_key && chmod 600 prod_ssh_key && ls -latrh prod_ssh_key
    - |
      for build_channel_cfg in $PERMALINK_BUILD_CHANNELS; do
        target_branch=$(cut -d ':' -f 1 <<<"$build_channel_cfg")
        build_channel_candidate=$(cut -d ':' -f 2 <<<"$build_channel_cfg")
        if [[ "$target_branch" == "$CI_COMMIT_REF_NAME" ]]; then
          build_channel="$build_channel_candidate"
        fi
      done
      if [[ "$build_channel" == "" ]]; then
        echo no build channel for branch $CI_COMMIT_REF_NAME
        exit 1
      fi
      echo using build channel $build_channel
    - |
      shopt -s globstar nullglob
      cd dist
      mkdir -p deploy
      for file in *.deb; do
        echo $file

        if [[ $file =~ nunet-appliance-(base|web)_([0-9]+\.[0-9]+\.[0-9]+)_([a-zA-Z0-9]+).deb ]]; then
          type=${BASH_REMATCH[1]}
          version=${BASH_REMATCH[2]}
          arch=${BASH_REMATCH[3]}

          new_name="nunet-appliance-$type-$version-$arch-$build_channel.deb"
          new_versionless_name="nunet-appliance-$type-$arch-$build_channel.deb"

          cp $file deploy/$new_name
          cp $file deploy/$new_versionless_name
        else
          echo "$file doesn't match regex capture, skipping..."
        fi
      done
      cd $CI_PROJECT_DIR
    - |
      rsync -va \
        --rsh "ssh -o StrictHostKeyChecking=no -i prod_ssh_key" \
        $CI_PROJECT_DIR/dist/deploy/ \
        $PERMALINK_DEPLOY_USER@$PERMALINK_DEPLOY_SERVER:$PERMALINK_DEPLOY_FOLDER
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^(release|release\/.+|release-.+|main)$/ && $CI_PIPELINE_SOURCE == "push"
      when: on_success
