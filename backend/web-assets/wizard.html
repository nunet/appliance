{% include "navbar.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NuNet Appliance Setup Wizard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='dark-theme.css') }}" rel="stylesheet">
</head>
<body class="bg-dark">
<div class="container py-5 mt-5" style="max-width: 600px;">
    <div class="card shadow-sm border">
        <div class="card-body">
            <h2 class="mb-4 text-center">Appliance Setup Wizard</h2>
            <form method="POST">
                <div class="mb-3">
                    <label for="setup_choice" class="form-label">Choose Setup Mode:</label>
                    <select id="setup_choice" name="setup_choice" class="form-select mb-3">
                        <option value="join_org">Join Organization</option>
                        <option value="local">Run Things Locally</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Continue</button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
