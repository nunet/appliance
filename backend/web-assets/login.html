<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NuNet Appliance Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='dark-theme.css') }}" rel="stylesheet">
    <style>
        .header {
            padding-top: 20px; /* Mobile default */
        }
        @media (min-width: 768px) {
            .header {
                padding-top: 50px; /* Desktop */
            }
        }
    </style>
</head>
<body class="bg-dark">
<div class="header text-center mb-4">
    <img src="{{ url_for('static', filename='appliance-logo.png') }}" alt="NuNet Logo" class="logo">
</div>
<div class="container py-5 mt-5" style="max-width: 500px;">
    <div class="card shadow-sm border">
        <div class="card-body">
            <h1 class="mb-4 text-center">Login</h1>
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="alert alert-success">{{ success }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label for="password" class="form-label">Enter Setup Password:</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 text-secondary">Remaining attempts: {{ attempts }}</div>
                <button type="submit" class="btn btn-primary w-100" {% if attempts <= 0 %}disabled{% endif %}>Login</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
