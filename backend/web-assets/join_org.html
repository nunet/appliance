{% include "navbar.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Organization</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='dark-theme.css') }}" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container py-5 mt-5" style="max-width: 600px;">
        <div class="card shadow-sm border">
            <div class="card-body">
                <h2 class="mb-4 text-center">Join Organization</h2>
                <form class="org-select-form" method="POST" action="/join_org">
                    <label for="org" class="form-label">Select Organization:</label>
                    <select name="org" id="org" class="form-select mb-3">
                        {% for did, org in known_orgs.items() %}
                        <option value="{{ did }}">{{ org.name if org.name else org }} ({{ did }})</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-primary w-100">Next</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
