version: "V1"

allocations:
    
    ollama-llm:
      executor: docker
      type: service
      resources:
        cpu:
          cores: 2
        gpus:
          - vendor: NVIDIA
          - vram: 16
        ram:
          size: 8
        disk:
          size: 20
      execution:
        type: docker
        image: ollama/ollama:latest
        environment:
          - NVIDIA_VISIBLE_DEVICES=all
          - NVIDIA_DRIVER_CAPABILITIES=compute,utility
          - OLLAMA_DEBUG=1
          #- OLLAMA_KEEP_ALIVE=-1
          #- OLLAMA_CONTEXT_LENGTH=8192
          # - OLLAMA_FLASH_ATTENTION=1
      volume:
          - type: local
            src: "/home/ubuntu/ollama"
            mount_destination: "/root/.ollama"
            read_only: false

    # n8n instance for building workflows visually
    n8n:
      executor: docker
      type: service
      resources:
        cpu:
          cores: 2
        ram:
          size: 4
        disk:
          size: 5
      execution:
        type: docker
        image: n8nio/n8n:latest
        environment:
          - N8N_DIAGNOSTICS_ENABLED=false
          - OLLAMA_HOST=http://ollama-llm.internal:17500
          - DMS_REQUIRE_PROXY=false
          - DMS_PROXY_PORT=5678
          - DMS_DDNS_URL=true
          - DMS_DDNS_DOMAIN=ddns.nunet.network
          - N8N_SECURE_COOKIE=false
      volume:
          - type: local
            src: "/home/ubuntu/n8n_data"
            mount_destination: "/home/node/.n8n"
            read_only: false

nodes:
    big-bertha:
       allocations:
            - ollama-llm
            - n8n
       ports:
          - public: 17500
            private: 11434
            allocation: ollama-llm
          # - public: 17000
          #   private: 5678
          #   allocation: n8n
       peer: {{peer_id}}