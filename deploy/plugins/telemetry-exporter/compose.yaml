services:
  mimir:
    image: grafana/mimir:2.14.3
    container_name: mimir-appliance
    restart: unless-stopped
    command:
      - "-config.file=/etc/mimir/mimir.yaml"
    ports:
      - "127.0.0.1:9009:9009"
    volumes:
      - /var/lib/nunet-appliance/mimir/data:/data
      - /var/lib/nunet-appliance/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro

  dcgm-exporter:
    image: nvidia/dcgm-exporter:3.3.8-3.6.0-ubuntu22.04
    container_name: dcgm-exporter-appliance
    restart: unless-stopped
    ports:
      - "127.0.0.1:9400:9400"
    gpus: all

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-appliance
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana-appliance
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/sys/plugins/telemetry-exporter/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - /var/lib/nunet-appliance/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  grafana_data:
